stages:
  - deploy

deploy_to_server:
  stage: deploy
  tags:
    - deploy  # <--- CRITICAL: Go to GitLab UI and check if your runner has this tag!
  script:
    - echo "Pipeline started!"
    - rsync -av --exclude='.git' --exclude='venv' ./ /mnt/general_accounting/
    - cd /mnt/general_accounting
    - python3 -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    # If you don't have a requirements.txt yet, comment the next line with #
    - pip install -r requirements.txt
    - python3 manage.py migrate --noinput
    - python3 manage.py collectstatic --noinput
    - echo "Deployment finished successfully"