stages:
  - deploy

deploy_to_server:
  stage: deploy
  tags:
    - deploy  # <--- Make sure this matches the TAG you gave the runner (Step 1.3)
  script:
    # 1. Sync the code from the runner's build folder to the web folder
    - rsync -av --exclude='.git' --exclude='venv' ./ /var/www/general_accounting/
    
    # 2. Go to the project directory
    - cd /var/www/general_accounting
    
    # 3. Create/Update Virtual Environment
    - python3 -m venv venv
    - source venv/bin/activate
    
    # 4. Install requirements
    - pip install --upgrade pip
    - pip install -r requirements.txt
    
    # 5. Run Django commands
    - python3 manage.py migrate --noinput
    - python3 manage.py collectstatic --noinput
    
    # 6. Restart your service (Example for Gunicorn/Systemd)
    # - sudo systemctl restart gunicorn
    
  only:
    - main  # Only deploy when you push to the 'main' (or master) branch